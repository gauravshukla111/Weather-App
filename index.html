<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium Weather App</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class="background-container">
      <div class="fallback-gradient"></div>
      
      <video id="bg-video" class="bg-media" autoplay loop muted playsinline>
        <source src="https://www.pexels.com/download/video/33409373/" type="video/mp4">
      </video>

      <img id="bg-image" class="bg-media hide-media" src="" alt="Weather Background" />
      
      <div class="fade-overlay" id="fade-overlay"></div>
    </div>

    <div class="app-container">
      <div class="card glass-panel">
        
        <div class="search">
          <input type="text" class="search-bar" id="search-input" placeholder="Enter city, state..." />
          <button class="search-btn" id="search-btn">
            <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 1024 1024" height="1.5em" width="1.5em" xmlns="http://www.w3.org/2000/svg">
              <path d="M909.6 854.5L649.9 594.8C690.2 542.7 712 479 712 412c0-80.2-31.3-155.4-87.9-212.1-56.6-56.7-132-87.9-212.1-87.9s-155.5 31.3-212.1 87.9C143.2 256.5 112 331.8 112 412c0 80.1 31.3 155.5 87.9 212.1C256.5 680.8 331.8 712 412 712c67 0 130.6-21.8 182.7-62l259.7 259.6a8.2 8.2 0 0 0 11.6 0l43.6-43.5a8.2 8.2 0 0 0 0-11.6zM570.4 570.4C528 612.7 471.8 636 412 636s-116-23.3-158.4-65.6C211.3 528 188 471.8 188 412s23.3-116.1 65.6-158.4C296 211.3 352.2 188 412 188s116.1 23.2 158.4 65.6S636 352.2 636 412s-23.3 116.1-65.6 158.4z"></path>
            </svg>
          </button>
        </div>

        <div class="loader-container hide" id="loader">
          <div class="spinner"></div>
          <p>Fetching real data...</p>
        </div>

        <div class="weather-content hide" id="weather-content">
          <h2 class="city" id="city-name">Weather</h2>
          <h1 class="temp" id="temperature">--°C</h1>
          <div class="flex-info">
            <img src="" alt="" class="weather-icon" id="weather-icon" />
            <div class="description" id="weather-desc">--</div>
          </div>
          <div class="bottom-details">
            <div class="detail-box">
              <span class="label">Humidity</span>
              <span class="value" id="humidity">--%</span>
            </div>
            <div class="detail-box">
              <span class="label">Wind Speed</span>
              <span class="value" id="wind">-- km/h</span>
            </div>
          </div>
        </div>
        
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
