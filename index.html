<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium Weather App</title>

    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- Background -->
    <div class="background-container">
      <div class="fallback-gradient"></div>
      
      <video id="bg-video" class="bg-media" autoplay loop muted playsinline>
        <source src="videos/14389825_3840_2160_30fps.mp4" type="video/mp4" />
      </video>

      <img id="bg-image" class="bg-media hide-media" src="" />

      <div class="fade-overlay" id="fade-overlay"></div>
    </div>

    <div class="search-tagline">
      <p id="heading-title">Discover the sky's secrets</p>
    </div>

    <!-- App -->
    <div class="app-container">
      <div class="card glass-panel">
        <div class="search">
          <input type="text" id="search-input" placeholder="Enter city..." />
          <button id="search-btn">🔍</button>
        </div>

        <!-- Loader -->
        <div id="loader" class="loader hide">
          <div class="spinner"></div>
          <p>Fetching data...</p>
        </div>

        <div id="weather" class="weather hide">
          <h2 id="city"></h2>
          <h1 id="temp"></h1>

          <div class="desc-box">
            <img id="icon" />
            <p id="desc"></p>
          </div>

          <div class="details">
            <div>Humidity: <span id="humidity"></span></div>
            <div>Wind: <span id="wind"></span></div>
          </div>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
